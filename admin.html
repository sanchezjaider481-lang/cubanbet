<!DOCTYPE html>
<html>
<body>
    <!-- Pantalla de Login -->
    <div id="loginSection">
        <input type="email" id="email" placeholder="Tu correo admin">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="hacerLogin()">Entrar</button>
    </div>

    <!-- Pantalla de Panel (oculta al inicio) -->
    <div id="adminPanel" style="display:none;">
        <h3>Panel de Depósitos</h3>
        <input type="text" id="userId" placeholder="ID del Usuario">
        <input type="number" id="monto" placeholder="Monto">
        <button onclick="procesarDeposito()">Sumar Saldo</button>
    </div>

    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getDatabase, ref, update, get, child } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

  const app = initializeApp({ /* Mismos datos de configuración de arriba */ });
  const db = getDatabase(app);

  window.aprobarRecarga = async function(userId, monto) {
    const dbRef = ref(db);
    const snapshot = await get(child(dbRef, `usuarios/${userId}/saldo`));
    let saldoActual = snapshot.exists() ? snapshot.val() : 0;
    
    await update(ref(db, `usuarios/${userId}`), {
      saldo: saldoActual + parseFloat(monto)
    });
    alert("Saldo sumado correctamente.");
  };
</script>

</body>
</html>
