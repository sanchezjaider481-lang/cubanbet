<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUBANBET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #050a05; font-family: sans-serif; color: white; padding-bottom: 80px; }
        header { background: #000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        
        .banner { 
            width: 100%; height: 250px; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=2000&auto=format&fit=crop'); 
            background-size: cover; background-position: center; position: relative; padding: 20px; box-sizing: border-box; 
        }
        
        /* Menú Inferior Fijo */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: #000; display: flex; justify-content: space-around; 
            align-items: center; border-top: 2px solid #222; z-index: 1000; 
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; 
            font-size: 11px; color: #fff; text-decoration: none; font-weight: bold;
        }
        
        /* Cajero Modal */
        #cajero-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; font-size: 20px;">CUBAN<span style="color: #ccff00;">BET</span></div>
        <div style="background: #111; padding: 5px 10px; color: #ccff00; font-weight: bold; border-radius: 4px;">$0.00</div>
    </header>

    <div class="banner">
        <h1 style="font-size: 24px; margin: 0;">TODO TU DINERO<br>ESTÁ EN EL JUEGO</h1>
        <button style="background: #ccff00; border: none; padding: 10px 20px; font-weight: bold; margin-top: 15px;">APUESTA AHORA</button>
    </div>

    <div id="partidos-container" style="padding: 10px;"></div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item"><i class="fas fa-home" style="font-size: 18px; margin-bottom: 5px;"></i>INICIO</a>
        <a href="#" class="nav-item"><i class="fas fa-gamepad" style="font-size: 18px; margin-bottom: 5px;"></i>MINIJUEGOS</a>
        <a href="#" class="nav-item" onclick="document.getElementById('cajero-modal').style.display='flex'"><i class="fas fa-wallet" style="font-size: 18px; margin-bottom: 5px; color:#ccff00;"></i>CAJERO</a>
        <a href="#" class="nav-item"><i class="fas fa-ticket" style="font-size: 18px; margin-bottom: 5px;"></i>BOLETO</a>
        <a href="#" class="nav-item"><i class="fas fa-user" style="font-size: 18px; margin-bottom: 5px;"></i>PERFIL</a>
    </nav>

    <div id="cajero-modal" style="flex-direction:column; justify-content:center; align-items:center;">
        <h2 style="color: #ccff00;">SOLICITAR DEPÓSITO</h2>
        <p>Tarjeta: 9238 1299 7498 4082</p>
        <button onclick="document.getElementById('cajero-modal').style.display='none'" style="margin-bottom:20px; background:transparent; color:#fff; border:1px solid #555; padding:10px 20px;">CERRAR</button>
    </div>

    <script src="js/datos.js"></script>
</body>
</html>
