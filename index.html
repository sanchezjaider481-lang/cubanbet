<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUBANBET</title>
    <!-- Importamos iconos para el menú inferior -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #050a05; font-family: sans-serif; color: white; }
        header { background: #000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #111; }
        .logo { font-size: 20px; font-weight: 900; }
        .saldo { background: #111; padding: 5px 10px; border-radius: 4px; border: 1px solid #333; color: #ccff00; font-weight: bold; }
        
        /* Banner Profesional */
        .banner { position: relative; width: 100%; height: 250px; overflow: hidden; }
        .banner img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .banner-text { position: absolute; top: 30px; left: 20px; }
        .banner-text h1 { margin: 0; font-size: 24px; line-height: 1.2; }
        .btn-apuesta { background: #ccff00; color: #000; padding: 10px 20px; border: none; font-weight: 900; margin-top: 15px; cursor: pointer; }

        <!-- Sección Cajero -->
<section id="cajero" style="padding: 20px; background: #050a05;">
    <h2 style="font-size: 18px; color: white;"><i class="fas fa-wallet"></i> SOLICITAR DEPÓSITO</h2>
    
    <div style="background: #0a140a; border: 1px solid #222; padding: 15px; border-radius: 8px;">
        <p style="color: #ffcc00; font-size: 12px; margin-bottom: 10px;">
            <i class="fas fa-exclamation-triangle"></i> El monto mínimo por depósito es de 500.00 CUP.
        </p>
        
        <label style="display:block; color:#888; font-size: 10px; margin-bottom:5px;">Monto a depositar (CUP)</label>
        <input type="number" placeholder="Mínimo 500" style="width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: white; margin-bottom: 15px;">

        <label style="display:block; color:#888; font-size: 10px; margin-bottom:5px;">Tarjeta de Destino</label>
        <div style="color: #ccff00; font-weight: bold; margin-bottom: 15px;">9238 1299 7498 4082</div>

        <!-- ENLACE A TELEGRAM -->
        <a href="-1004432353397" target="_blank" style="text-decoration: none;">
            <button style="width: 100%; background: #ccff00; color: #000; padding: 12px; border: none; font-weight: 900; border-radius: 4px; cursor: pointer;">
                VERIFICAR DEPÓSITO EN TELEGRAM
            </button>
        </a>
    </div>
</section>
        
        /* Menú Inferior */
                .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: #000; 
            display: flex; 
            justify-content: space-around; 
            padding: 15px 0; 
            border-top: 1px solid #222; 
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">CUBAN<span style="color: #ccff00;">BET</span></div>
        <div class="saldo">$0.00</div>
    </header>

    <div class="banner">
        <img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=2000&auto=format&fit=crop" alt="Casino">
        <div class="banner-text">
            <h1>TODO TU DINERO<br>ESTÁ EN EL JUEGO</h1>
            <button class="btn-apuesta">APUESTA AHORA</button>
        </div>
    </div>

    <!-- Aquí se inyectarán tus partidos desde datos.js -->
    <div id="partidos-container"></div>
    <div style="background: #0a140a; margin: 15px; padding: 15px; border-radius: 8px; border: 1px solid #222;">
        <h2 style="font-size: 14px; color: white; margin-top:0;">SOLICITAR DEPÓSITO</h2>
        <div style="color: #ccff00; font-weight:bold; margin-bottom: 10px;">Tarjeta: 9238 1299 7498 4082</div>
        <a href="https://t.me/tu_usuario_de_telegram" target="_blank" style="text-decoration:none;">
            <button style="width:100%; background:#ccff00; border:none; padding:10px; font-weight:bold; cursor:pointer;">VERIFICAR EN TELEGRAM</button>
        </a>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i>INICIO</div>
        <div class="nav-item"><i class="fas fa-gamepad"></i>MINIJUEGOS</div>
        <div class="nav-item"><i class="fas fa-ticket"></i>BOLETO</div>
        <div class="nav-item"><i class="fas fa-list"></i>APUESTAS</div>
        <div class="nav-item"><i class="fas fa-user"></i>PERFIL</div>
    </nav>

    <script src="js/datos.js"></script>
    <script>
        // Lógica para pintar los partidos
        const container = document.getElementById('partidos-container');
        if (typeof misPartidos !== 'undefined') {
            container.innerHTML = misPartidos.map(p => `
                <div style="background: #0a140a; padding: 15px; margin: 15px; border-radius: 8px;">
                    <div style="color: #ccff00; font-size: 10px;">${p.campeonato}</div>
                    <div style="font-weight: bold; margin: 5px 0;">${p.local} VS ${p.visitante}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
