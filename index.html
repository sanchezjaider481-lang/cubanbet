<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUBANBET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #050a05; font-family: sans-serif; color: white; padding-bottom: 70px; }
        header { background: #000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #111; }
        .logo { font-weight: 900; }
        .saldo { background: #111; padding: 5px 10px; border: 1px solid #333; color: #ccff00; font-weight: bold; }
        
        .banner { 
    width: 100%; 
    height: 250px; 
    background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=2000&auto=format&fit=crop');
    background-size: cover;
    background-position: center;
    position: relative; 
}

        .banner-text { position: absolute; top: 30px; left: 20px; }
        .btn-apuesta { background: #ccff00; color: #000; padding: 10px 20px; border: none; font-weight: 900; margin-top: 15px; }

        /* Menú Inferior */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #888; text-decoration: none; }
        
        /* Sección Cajero (Oculta por defecto) */
        #cajero-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

    <header>
        <div class="logo">CUBAN<span style="color: #ccff00;">BET</span></div>
        <div class="saldo">$0.00</div>
    </header>
    <!-- Barra de búsqueda -->
<div style="padding: 15px;">
    <input type="text" id="buscador" placeholder="Buscar equipo o liga..." 
    style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 4px;">
</div>


    <div class="banner">
        <div class="banner-text">
            <h1>TODO TU DINERO<br>ESTÁ EN EL JUEGO</h1>
            <button class="btn-apuesta">APUESTA AHORA</button>
        </div>
    </div>

    <div id="partidos-container"></div>

    <!-- Menú Inferior -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item"><i class="fas fa-home"></i>INICIO</a>
        <a href="#" class="nav-item"><i class="fas fa-gamepad"></i>MINIJUEGOS</a>
        <a href="#" class="nav-item" onclick="document.getElementById('cajero-modal').style.display='block'"><i class="fas fa-wallet"></i>CAJERO</a>
        <a href="#" class="nav-item"><i class="fas fa-ticket"></i>BOLETO</a>
        <a href="#" class="nav-item"><i class="fas fa-user"></i>PERFIL</a>
    </nav>

    <!-- Modal Cajero -->
    <div id="cajero-modal">
        <h2 style="color: #ccff00;">SOLICITAR DEPÓSITO</h2>
        <p>Tarjeta: 9238 1299 7498 4082</p>
        <a href="https://t.me/tu_usuario_de_telegram" target="_blank" style="text-decoration:none;">
            <button style="width:100%; padding:15px; background:#ccff00; border:none; font-weight:bold;">VERIFICAR EN TELEGRAM</button>
        </a>
        <button onclick="document.getElementById('cajero-modal').style.display='none'" style="margin-top:20px; background:transparent; color:white; border:1px solid #555; width:100%; padding:10px;">CERRAR</button>
    </div>

    <script src="js/datos.js"></script>
    <script>
    // Aseguramos que el script se ejecute cuando cargue la página
    document.addEventListener("DOMContentLoaded", function() {
        const container = document.getElementById('partidos-container');
        
        // Verificamos si los datos existen
        if (typeof misPartidos !== 'undefined') {
            container.innerHTML = misPartidos.map(p => `
                <div style="background: #0a140a; margin: 15px; padding: 15px; border-radius: 8px; border: 1px solid #222;">
                    <div style="color: #ccff00; font-size: 10px; margin-bottom: 5px;">${p.campeonato}</div>
                    <div style="font-weight: bold; font-size: 16px; margin-bottom: 15px;">${p.local} VS ${p.visitante}</div>
                    <div style="display: flex; gap: 10px;">
                        <button style="flex: 1; padding: 10px; background: #111; color: white; border: 1px solid #333; cursor: pointer;">${p.cuota1}</button>
                        <button style="flex: 1; padding: 10px; background: #111; color: white; border: 1px solid #333; cursor: pointer;">${p.cuotaX}</button>
                        <button style="flex: 1; padding: 10px; background: #111; color: white; border: 1px solid #333; cursor: pointer;">${p.cuota2}</button>
                    </div>
                </div>
            `).join('');
        }
    });
</script>

</body>
</html>
