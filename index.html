<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubanBet</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Asegurar que el contenido ocupe la altura correcta */
        body { margin: 0; font-family: sans-serif; background-color: #f3f4f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <!-- CONTENIDO -->
    <main id="content" class="p-4 pb-20">
        <section id="inicio" class="tab-content active p-4">
    <!-- Header con Saldo -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-green-600">CubanBet</h1>
        <div class="bg-gray-200 px-3 py-1 rounded-full text-sm font-bold">CUP 0.00</div>
    </div>

    <!-- Barra de búsqueda -->
    <div class="mb-6">
        <input type="text" placeholder="Buscar equipos o ligas..." class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:border-green-500">
    </div>

    <!-- Sección de Estadísticas -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <p class="text-gray-500 text-xs">Apuestas Activas</p>
            <p class="text-xl font-bold">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <p class="text-gray-500 text-xs">Ganancia Potencial</p>
            <p class="text-xl font-bold text-green-600">CUP 0.00</p>
        </div>
    </div>

    <!-- Título de sección -->
    <h3 class="font-bold text-gray-700 mb-3">Promociones</h3>
    <div class="bg-green-100 p-4 rounded-xl border border-green-200">
        <p class="text-green-800 text-sm font-semibold">20% de reembolso instantáneo</p>
        <p class="text-green-600 text-xs">Mejora tus apuestas con devoluciones.</p>
    </div>
</section>

        <section id="minijuegos" class="tab-content p-4">
    <h2 class="text-2xl font-bold text-green-600 mb-6">Minijuegos</h2>
    
    <!-- Cuadrícula de juegos -->
    <div class="grid grid-cols-2 gap-4">
        
        <!-- Tarjeta de juego 1 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center transition-transform hover:scale-105">
            <span class="text-4xl mb-2">🎰</span>
            <p class="font-bold text-gray-700">Ruleta</p>
        </div>

        <!-- Tarjeta de juego 2 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center transition-transform hover:scale-105">
            <span class="text-4xl mb-2">🎲</span>
            <p class="font-bold text-gray-700">Dados</p>
        </div>

        <!-- Tarjeta de juego 3 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center transition-transform hover:scale-105">
            <span class="text-4xl mb-2">🃏</span>
            <p class="font-bold text-gray-700">Cartas</p>
        </div>

        <!-- Tarjeta de juego 4 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center transition-transform hover:scale-105">
            <span class="text-4xl mb-2">⚽</span>
            <p class="font-bold text-gray-700">Penaltis</p>
        </div>
    </div>
</section>

        <section id="deportes" class="tab-content">
            <h2 class="text-2xl font-bold text-green-600">Deportes</h2>
        </section>
        <section id="boleta" class="tab-content">
            <h2 class="text-2xl font-bold text-green-600">Boleta</h2>
        </section>
        <section id="perfil" class="tab-content">
            <h2 class="text-2xl font-bold text-green-600">Perfil</h2>
        </section>
    </main>

    <!-- BARRA NAVEGACIÓN -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-between px-2 py-3 shadow-lg">
    <button id="btn-inicio" onclick="cambiarTab('inicio')" class="text-green-600 text-xs font-bold">Inicio</button>
    <button id="btn-minijuegos" onclick="cambiarTab('minijuegos')" class="text-gray-500 text-xs font-bold">Juegos</button>
    <button id="btn-deportes" onclick="cambiarTab('deportes')" class="text-gray-500 text-xs font-bold">Deportes</button>
    <button id="btn-boleta" onclick="cambiarTab('boleta')" class="text-gray-500 text-xs font-bold">Boleta</button>
    <button id="btn-perfil" onclick="cambiarTab('perfil')" class="text-gray-500 text-xs font-bold">Perfil</button>
</nav>


    <script>
    function cambiarTab(id) {
        // 1. Ocultar todas las secciones de contenido
        document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
        
        // 2. Mostrar la sección seleccionada
        document.getElementById(id).classList.add('active');

        // 3. Resetear todos los botones a color gris
        const botones = ['btn-inicio', 'btn-minijuegos', 'btn-deportes', 'btn-boleta', 'btn-perfil'];
        botones.forEach(btnId => {
            document.getElementById(btnId).classList.replace('text-green-600', 'text-gray-500');
        });

        // 4. Poner el botón seleccionado en verde
        document.getElementById('btn-' + id).classList.replace('text-gray-500', 'text-green-600');
    }
</script>

</body>
</html>
