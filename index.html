<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubanBet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f9fafb; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="pb-20">

    <div id="loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white">
        <div class="w-16 h-16 border-4 border-green-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h1 class="text-3xl font-black text-green-600 tracking-tighter">CubanBet</h1>
    </div>

    <main id="content">
        <section id="inicio" class="tab-content active p-4">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-green-600">CubanBet</h1>
                <div class="bg-gray-200 px-3 py-1 rounded-full text-sm font-bold">CUP 0.00</div>
            </div>
            <div class="mb-6"><input type="text" placeholder="Buscar..." class="w-full p-3 rounded-lg border border-gray-300"></div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100"><p class="text-gray-500 text-xs">Apuestas Activas</p><p class="text-xl font-bold">0</p></div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100"><p class="text-gray-500 text-xs">Ganancia Potencial</p><p class="text-xl font-bold text-green-600">CUP 0.00</p></div>
            </div>
        </section>

        <section id="minijuegos" class="tab-content p-4">
            <h2 class="text-2xl font-bold text-green-600 mb-6">Minijuegos</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm text-center">🎰<p class="font-bold">Ruleta</p></div>
                <div class="bg-white p-6 rounded-2xl shadow-sm text-center">🎲<p class="font-bold">Dados</p></div>
                <div class="bg-white p-6 rounded-2xl shadow-sm text-center">🃏<p class="font-bold">Cartas</p></div>
                <div class="bg-white p-6 rounded-2xl shadow-sm text-center">⚽<p class="font-bold">Penaltis</p></div>
            </div>
        </section>

        <section id="deportes" class="tab-content p-4">
            <h2 class="text-2xl font-bold text-green-600 mb-4">Deportes</h2>
            <div id="lista-partidos" class="space-y-4"></div>
        </section>

        <section id="boleta" class="tab-content p-4">
            <h2 class="text-2xl font-bold text-green-600 mb-6">Tu Boleta</h2>
            <div id="lista-boleta" class="space-y-4"><p class="text-gray-500 text-center py-10">Tu boleta está vacía</p></div>
            <div class="mt-8 bg-white p-4 rounded-xl shadow-lg border border-gray-100">
                <div class="mb-4">
                    <label class="text-xs text-gray-500 font-bold uppercase">Monto a apostar (CUP)</label>
                    <input type="number" id="input-monto" placeholder="Ej: 100" oninput="actualizarBoleta()" class="w-full mt-1 p-3 bg-gray-50 rounded-xl border border-gray-200 font-bold">
                </div>
                <div class="flex justify-between mb-2"><span>Total cuota:</span><span id="display-total-cuota" class="font-bold">0.00</span></div>
                <div class="flex justify-between mb-4"><span>Ganancia:</span><span id="display-ganancia" class="text-green-600 font-bold">CUP 0.00</span></div>
                <button class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">Realizar Apuesta</button>
            </div>
        </section>

        <section id="perfil" class="tab-content p-4">
            <h2 class="text-2xl font-bold text-green-600 mb-6">Mi Perfil</h2>
            <div class="bg-white p-6 rounded-2xl text-center mb-6">👤<h3 class="font-bold">Usuario</h3></div>
            <button class="w-full bg-white p-4 rounded-xl border border-gray-100 text-red-600 font-bold">Cerrar Sesión</button>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-between px-4 py-3 shadow-lg">
        <button id="btn-inicio" onclick="cambiarTab('inicio')" class="text-green-600 text-xs font-bold">Inicio</button>
        <button id="btn-minijuegos" onclick="cambiarTab('minijuegos')" class="text-gray-500 text-xs font-bold">Juegos</button>
        <button id="btn-deportes" onclick="cambiarTab('deportes')" class="text-gray-500 text-xs font-bold">Deportes</button>
        <button id="btn-boleta" onclick="cambiarTab('boleta')" class="text-gray-500 text-xs font-bold">Boleta</button>
        <button id="btn-perfil" onclick="cambiarTab('perfil')" class="text-gray-500 text-xs font-bold">Perfil</button>
    </nav>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                loader.style.transition = 'opacity 0.5s ease';
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            }, 3000);
        });

        function cambiarTab(id) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            // Resaltado de botones
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-green-600', 'text-gray-500'));
            document.getElementById('btn-'+id).classList.replace('text-gray-500', 'text-green-600');
        }

        async function cargarPartidos() {
            try {
                const res = await fetch('partidos.json');
                const p = await res.json();
                document.getElementById('lista-partidos').innerHTML = p.map(partido => `
                    <div class="bg-white p-4 rounded-xl border border-gray-100">
                        <p class="font-bold">${partido.equipoA} vs ${partido.equipoB}</p>
                        <div class="grid grid-cols-3 gap-2 mt-2">
                            <button onclick="agregarABoleta('${partido.equipoA}', '${partido.equipoB}', '1', ${partido.cuota1})" class="bg-gray-100 p-2 rounded text-sm font-bold">1: ${partido.cuota1}</button>
                            <button onclick="agregarABoleta('${partido.equipoA}', '${partido.equipoB}', 'X', ${partido.cuotaX})" class="bg-gray-100 p-2 rounded text-sm font-bold">X: ${partido.cuotaX}</button>
                            <button onclick="agregarABoleta('${partido.equipoA}', '${partido.equipoB}', '2', ${partido.cuota2})" class="bg-gray-100 p-2 rounded text-sm font-bold">2: ${partido.cuota2}</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        let boleta = [];
        function agregarABoleta(a, b, sel, cuota) {
            boleta = boleta.filter(i => i.id !== a+b);
            boleta.push({ id: a+b, a, b, sel, cuota: parseFloat(cuota) });
            actualizarBoleta();
        }

        function actualizarBoleta() {
            const cont = document.getElementById('lista-boleta');
            const totalCuota = boleta.reduce((acc, i) => acc * i.cuota, 1);
            const monto = parseFloat(document.getElementById('input-monto').value) || 0;
            
            cont.innerHTML = boleta.length === 0 ? '<p class="text-gray-500 text-center py-10">Tu boleta está vacía</p>' : 
                boleta.map(i => `<div class="bg-gray-50 p-3 rounded flex justify-between">${i.a} vs ${i.b} (${i.sel}) <b>${i.cuota}</b><button onclick="eliminar('${i.id}')" class="text-red-500">×</button></div>`).join('');
            
            document.getElementById('display-total-cuota').innerText = boleta.length > 0 ? totalCuota.toFixed(2) : "0.00";
            document.getElementById('display-ganancia').innerText = "CUP " + (totalCuota * monto).toFixed(2);
        }

        function eliminar(id) {
            boleta = boleta.filter(i => i.id !== id);
            actualizarBoleta();
        }

        cargarPartidos();
    </script>
</body>
</html>
