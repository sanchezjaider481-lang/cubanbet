<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CUBANBET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #050a05; color: white; font-family: sans-serif; padding-bottom: 100px; }
        .banner { width: 100%; height: 180px; background: url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=800') center/cover; position: relative; display: flex; align-items: center; justify-content: center; }
        .banner::after { content: ""; position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .banner h1 { z-index: 1; text-align: center; font-size: 1.2rem; }
        
        /* Tarjeta de Partido */
        .partido-card { background: #1a1a1a; margin: 10px; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .bloqueado { opacity: 0.4; pointer-events: none; }
        .grid-cuotas { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-cuota { background: #262626; color: #ccff00; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid #ccff00; }
    </style>
</head>
<body>

    <div class="banner"><h1>TODO TU DINERO<br>ESTÁ EN EL JUEGO</h1></div>
    <div id="partidos-container"></div>

    <nav class="nav-bottom">
        <a href="#" style="color:#ccff00; text-decoration:none;"><i class="fas fa-home"></i><br>INICIO</a>
        <a href="#" style="color:#ccff00; text-decoration:none;"><i class="fas fa-calculator"></i><br>PARLAY</a>
        <a href="#" style="color:#ccff00; text-decoration:none;"><i class="fas fa-gamepad"></i><br>JUEGOS</a>
    </nav>

    <script src="js/datos.js"></script>
    <script>
        function cargarPartidos() {
            const container = document.getElementById('partidos-container');
            const ahora = new Date();

            container.innerHTML = misPartidos.map(p => {
                const [h, m] = p.hora.split(':');
                const horaInicio = new Date();
                horaInicio.setHours(h, m, 0);
                
                const estaCerrado = ahora >= horaInicio;
                
                return `
                    <div class="partido-card ${estaCerrado ? 'bloqueado' : ''}">
                        <div style="font-size:10px; color:#ccff00;">${p.campeonato} • ${estaCerrado ? 'CERRADO' : p.hora}</div>
                        <div style="font-weight:bold; margin:5px 0;">${p.local} VS ${p.visitante}</div>
                        <div class="grid-cuotas">
                            <button class="btn-cuota" onclick="agregarAlParlay('${p.local}', ${p.cuota1})">1<br>${p.cuota1}</button>
                            <button class="btn-cuota" onclick="agregarAlParlay('Empate', ${p.cuotaX})">X<br>${p.cuotaX}</button>
                            <button class="btn-cuota" onclick="agregarAlParlay('${p.visitante}', ${p.cuota2})">2<br>${p.cuota2}</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Base para el calculador
        let parlay = [];
        function agregarAlParlay(equipo, cuota) {
            parlay.push({equipo, cuota});
            alert("Añadido: " + equipo + " (Cuota " + cuota + ")");
        }

        window.onload = cargarPartidos;
    </script>
</body>
</html>
