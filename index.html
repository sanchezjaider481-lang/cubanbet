<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubanBet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f9fafb; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="pb-20">

    <div id="loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white">
    <div class="w-16 h-16 border-4 border-green-600 border-t-transparent rounded-full animate-spin mb-4"></div>
    <h1 class="text-3xl font-black text-green-600 tracking-tighter">CubanBet</h1>
    <p id="porcentaje" class="text-green-600 font-bold mt-2">0%</p>
</div>


    <main id="content">
        <section id="inicio" class="tab-content active p-4">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-green-600">CubanBet</h1>
                <div class="bg-gray-200 px-3 py-1 rounded-full text-sm font-bold" id="display-saldo">CUP 0.00</div>
            </div>
            <div class="mb-6"><input type="text" placeholder="Buscar..." class="w-full p-3 rounded-lg border border-gray-300"></div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100"><p class="text-gray-500 text-xs">Apuestas Activas</p><p class="text-xl font-bold">0</p></div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100"><p class="text-gray-500 text-xs">Ganancia Potencial</p><p class="text-xl font-bold text-green-600">CUP 0.00</p></div>
            </div>
        </section>

        <section id="minijuegos" class="tab-content p-4">
            <h2 class="text-2xl font-bold text-green-600 mb-6">Minijuegos</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm text-center">🎰<p class="font-bold">Ruleta</p></div>
                <div class="bg-white p-6 rounded-2xl shadow-sm text-center">🎲<p class="font-bold">Dados</p></div>
                <div class="bg-white p-6 rounded-2xl shadow-sm text-center">🃏<p class="font-bold">Cartas</p></div>
                <div class="bg-white p-6 rounded-2xl shadow-sm text-center">⚽<p class="font-bold">Penaltis</p></div>
            </div>
        </section>

        <section id="deportes" class="tab-content p-4">
            <h2 class="text-2xl font-bold text-green-600 mb-4">Deportes</h2>
            <div id="lista-partidos" class="space-y-4"></div>
        </section>

        <section id="boleta" class="tab-content p-4">
            <h2 class="text-2xl font-bold text-green-600 mb-6">Tu Boleta</h2>
            <div id="lista-boleta" class="space-y-4"><p class="text-gray-500 text-center py-10">Tu boleta está vacía</p></div>
            <div class="mt-8 bg-white p-4 rounded-xl shadow-lg border border-gray-100">
                <div class="mb-4">
                    <label class="text-xs text-gray-500 font-bold uppercase">Monto a apostar (CUP)</label>
                    <input type="number" id="input-monto" placeholder="Ej: 100" oninput="actualizarBoleta()" class="w-full mt-1 p-3 bg-gray-50 rounded-xl border border-gray-200 font-bold">
                </div>
                <div class="flex justify-between mb-2"><span>Total cuota:</span><span id="display-total-cuota" class="font-bold">0.00</span></div>
                <div class="flex justify-between mb-4"><span>Ganancia:</span><span id="display-ganancia" class="text-green-600 font-bold">CUP 0.00</span></div>
                <button class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">Realizar Apuesta</button>
            </div>
        </section>

        <section id="perfil" class="tab-content p-4">
    <h2 class="text-2xl font-bold text-green-600 mb-6">Mi Perfil</h2>
    
    <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100">
        <h3 class="font-bold text-lg mb-4 text-green-700">Solicitar Recarga</h3>
        
        <!-- SELECT ÚNICO -->
        <select id="metodo-pago" onchange="mostrarDatos()" class="w-full p-3 mb-4 rounded-xl border border-gray-200 bg-gray-50 font-bold">
            <option value="">Selecciona el banco de tu transferencia</option>
            <option value="BPA">BPA</option>
            <option value="BANDEC">BANDEC</option>
            <option value="ENZONA">ENZONA</option>
        </select>
        
        <!-- DIV DE INFORMACIÓN ÚNICO -->
        <div id="info-pago" class="hidden bg-gray-50 p-4 rounded-xl mb-4 text-sm border border-gray-200 text-center">
            <img id="logo-banco" src="" class="w-16 h-16 mx-auto mb-3 rounded-lg shadow-sm hidden">
            <p id="datos-tarjeta" class="font-bold text-gray-800 text-lg"></p>
            <p class="text-gray-500 mt-2">Confirmar a: <span class="text-black font-bold">58838866</span></p>
            <p class="text-red-500 font-bold mt-2 text-xs">Min $500 - Max $4000</p>
       </div>
        
        <input type="number" id="monto-recarga" placeholder="Monto (CUP)" class="w-full p-3 mb-4 rounded-xl border border-gray-200">
        <label class="block text-xs text-gray-500 font-bold uppercase mt-4">Comprobante de pago (Imagen)</label>
<input type="file" id="archivo-comprobante" accept="image/*" class="w-full p-3 mb-4 rounded-xl border border-gray-200">


        <button onclick="enviarSolicitud()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold">Verificar Depósito</button>
        
        <button class="w-full mt-4 bg-white p-4 rounded-xl border border-gray-100 text-red-600 font-bold">Cerrar Sesión</button>
    </div>
</section>

    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-between px-4 py-3 shadow-lg">
        <button id="btn-inicio" onclick="cambiarTab('inicio')" class="text-green-600 text-xs font-bold">Inicio</button>
        <button id="btn-minijuegos" onclick="cambiarTab('minijuegos')" class="text-gray-500 text-xs font-bold">Juegos</button>
        <button id="btn-deportes" onclick="cambiarTab('deportes')" class="text-gray-500 text-xs font-bold">Deportes</button>
        <button id="btn-boleta" onclick="cambiarTab('boleta')" class="text-gray-500 text-xs font-bold">Boleta</button>
        <button id="btn-perfil" onclick="cambiarTab('perfil')" class="text-gray-500 text-xs font-bold">Perfil</button>
    </nav>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBaR9vwVuQph--DQ9pEAciPk21ZOgZVM2o",
    authDomain: "cubanbet-32254.firebaseapp.com",
    projectId: "cubanbet-32254",
    storageBucket: "cubanbet-32254.firebasestorage.app",
    messagingSenderId: "470616151074",
    appId: "1:470616151074:web:8624013ff21f5e3c85267b",
    measurementId: "G-JZQRVYXEVM"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
window.db = db;
window.boleta = [];

async function iniciarApp() {
    let progreso = 0;
    const el = document.getElementById('porcentaje');
    const interval = setInterval(() => {
        progreso += 10;
        if(el) el.innerText = progreso + "%";
        if(progreso >= 100) clearInterval(interval);
    }, 100);
    
    setTimeout(() => {
        const loader = document.getElementById('loader');
        if(loader) { loader.style.opacity = '0'; setTimeout(() => { loader.style.display = 'none'; }, 500); }
    }, 1500);
}

window.cambiarTab = function(id) {
    document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
};

window.mostrarDatos = function() {
    const metodo = document.getElementById('metodo-pago').value;
    const infoPago = document.getElementById('info-pago');
    const logo = document.getElementById('logo-banco');
    const tarjeta = document.getElementById('datos-tarjeta');
    
    const config = {
        "BPA": { logo: "img/logo-bpa.png", num: "9238129974984082" },
        "BANDEC": { logo: "img/logo-bandec.png", num: "9234069994220535" },
        "ENZONA": { logo: "img/logo-enzona.png", num: "9238129974984082" }
    };

    if(metodo && config[metodo]) {
        infoPago.classList.remove('hidden');
        logo.src = config[metodo].logo;
        logo.classList.remove('hidden');
        tarjeta.innerText = "Tarjeta: " + config[metodo].num;

        // AQUÍ ESTÁN LAS ALERTAS QUE FALTABAN
        if (metodo === "BPA" || metodo === "BANDEC") {
            alert("IMPORTANTE:\n\n1. En Transfermóvil, DEBES marcar la casilla 'Compartir número de teléfono'.\n2. El número debe ser EXACTAMENTE el mismo que tienes en tu perfil de CubanBet.");
        } else if (metodo === "ENZONA") {
            window.codigoEnzona = "Nota:" + Math.floor(1000 + Math.random() * 9000);
            alert("AVISO ENZONA:\n\nTu código de concepto es: " + window.codigoEnzona + "\n(Anota este código antes de continuar)");
        }
    } else {
        infoPago.classList.add('hidden');
    }
};

window.enviarSolicitud = async function() {
    const metodo = document.getElementById('metodo-pago').value;
    const monto = document.getElementById('monto-recarga').value;
    const file = document.getElementById('archivo-comprobante').files[0];

    if (!metodo || !monto || !file) { alert("Completa todos los campos"); return; }
    
    alert("Procesando envío...");

    try {
        // 1. Subir imagen
        const formData = new FormData();
        formData.append('image', file);
        const resImg = await fetch('https://api.imgbb.com/1/upload?key=87532298715785a9739097f48b941575', { method: 'POST', body: formData });
        const dataImg = await resImg.json();
        const urlFoto = dataImg.data.url;

        // 2. Preparar datos Telegram
        const token = "8800459646:AAFuPXErVD2HD3y4gISSkUV9Nm2JSAbkdJo";
        const chatId = "-1004432353397";
        const texto = `Nueva Recarga: ${monto} CUP | Banco: ${metodo}`;
        
        // 3. Enviar foto a Telegram
        const urlTel = `https://api.telegram.org/bot${token}/sendPhoto?chat_id=${chatId}&photo=${encodeURIComponent(urlFoto)}&caption=${encodeURIComponent(texto)}`;
        
        const resTel = await fetch(urlTel);
        const jsonTel = await resTel.json();

        if (jsonTel.ok) {
            alert("¡Éxito! Mensaje enviado a Telegram.");
        } else {
            console.error("Error Telegram:", jsonTel);
            alert("Error Telegram: " + jsonTel.description);
        }
    } catch (e) {
        console.error("Error general:", e);
        alert("Error crítico: " + e.message);
    }
};


iniciarApp();
    </script>


</body>
    </html>
