<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CubanBet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/esstilos.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <header class="header-app">
        <div class="logo">Cuban<span>Bet</span></div>
        <div class="saldo-usuario">Saldo: <span id="saldo-cup">0.00</span> CUP</div>
    </header>

    <nav class="menu-deportes">
        <button class="active" onclick="cambiarDeporte('futbol', this)"><i class="fa-solid fa-futbol"></i> Fútbol</button>
        <button onclick="cambiarDeporte('beisbol', this)"><i class="fa-solid fa-baseball-bat-ball"></i> Béisbol</button>
        <button onclick="cambiarDeporte('basket', this)"><i class="fa-solid fa-basketball"></i> Basket</button>
        <button onclick="cambiarDeporte('tenis', this)"><i class="fa-solid fa-baseball"></i> Tenis</button>
    </nav>

    <main id="lista-partidos">
        </main>

    <div id="boleto-apuesta" class="boleto-contenedor" style="display: none;">
        <div class="boleto-header">
            <h3>Boleto de Apuesta</h3>
            <button onclick="cerrarBoleto()">&times;</button>
        </div>
        <div class="boleto-cuerpo">
            <p id="boleto-partido" class="b-partido"></p>
            <p>Selección: <strong id="boleto-prediccion"></strong> (<span id="boleto-cuota"></span>)</p>
            
            <div class="b-monto-bloque">
                <label>Monto (CUP):</label>
                <input type="number" id="apuesta-monto" oninput="calcularGanancia()" placeholder="0.00">
            </div>
            <div class="b-retorno">
                <span>Ganancia Posible:</span>
                <strong id="boleto-ganancia">0.00 CUP</strong>
            </div>
            <button class="btn-enviar-apuesta" onclick="enviarApuestaTelegram()">Confirmar Apuesta</button>
        </div>
    </div>

    <div id="modal-deposito" class="modal-pantalla" style="display: none;">
        <div class="modal-cuerpo">
            <h3>Depositar Saldo</h3>
            <form id="form-deposito" onsubmit="procesarDeposito(event)">
                <label>Monto a Depositar (CUP):</label>
                <input type="number" id="deposito-monto" required placeholder="Ej: 500">
                <p class="nota-pago">Transfiere a la tarjeta del administrador e ingresa el monto arriba.</p>
                <div class="modal-botones">
                    <button type="button" class="btn-cancelar" onclick="cerrarModalDeposito()">Cancelar</button>
                    <button type="submit" class="btn-confirmar">Solicitar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-retiro" class="modal-pantalla" style="display: none;">
        <div class="modal-cuerpo">
            <h3>Retirar Ganancias</h3>
            <form id="form-retiro" onsubmit="procesarRetiro(event)">
                <label>Monto a Retirar (CUP):</label>
                <input type="number" id="retiro-monto" required placeholder="Ej: 1000">
                <label>Datos de tu Tarjeta/Cuenta:</label>
                <textarea id="retiro-detalles" required placeholder="Número de tarjeta, nombre y banco..."></textarea>
                <div class="modal-botones">
                    <button type="button" class="btn-cancelar" onclick="cerrarModalRetiro()">Cancelar</button>
                    <button type="submit" class="btn-confirmar">Cobrar</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="nav-inferior">
        <button class="nav-item active" onclick="location.reload()">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
        </button>
        <button class="nav-item" onclick="alert('Sección En Vivo (Actualizaciones en tiempo real activas)')">
            <i class="fa-solid fa-bolt"></i>
            <span>En Vivo</span>
        </button>
        <button class="nav-item" onclick="alert('Historial sincronizado directamente en tu bot administrador')">
            <i class="fa-solid fa-receipt"></i>
            <span>Mis Jugadas</span>
        </button>
        <button class="nav-item" onclick="abrirModalDeposito()">
            <i class="fa-solid fa-wallet"></i>
            <span>Depositar</span>
        </button>
        <button class="nav-item" onclick="abrirModalRetiro()">
            <i class="fa-solid fa-money-bill-transfer"></i>
            <span>Retirar</span>
        </button>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
