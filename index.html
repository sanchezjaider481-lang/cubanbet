<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUBANBET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #050a05; font-family: sans-serif; color: white; padding-bottom: 90px; }
        .banner { width: 100%; height: 200px; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=2000&auto=format&fit=crop'); background-size: cover; background-position: center; padding: 20px; box-sizing: border-box; }
        .partido-card { background: #0a140a; margin: 10px 15px; padding: 15px; border-radius: 8px; border: 1px solid #222; }
        .cuota-btn { flex: 1; padding: 10px; background: #111; color: white; border: 1px solid #333; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid #ccff00; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #ccff00; text-decoration: none; font-weight: bold; }
        /* Nuevo estilo para ver mercados */
        .ver-mercados { text-align: center; color: #ccff00; font-size: 12px; margin-top: 10px; cursor: pointer; padding-top: 5px; border-top: 1px solid #222; }
        /* Estilo para el Boleto Flotante */
#ticket-flotante {
    position: fixed;
    bottom: 80px;
    width: 95%;
    left: 2.5%;
    background: #1a1a1a;
    border: 2px solid #ccff00;
    border-radius: 10px;
    padding: 15px;
    display: none;
    box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
    z-index: 2000;
}
.btn-apostar { background: #ccff00; color: #000; width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

    </style>
</head>
<body>

    <header style="padding: 15px; background: #000; display: flex; justify-content: space-between;">
        <div style="font-weight: 900; font-size: 18px;">CUBAN<span style="color: #ccff00;">BET</span></div>
        <div style="color: #ccff00; font-weight: bold;">$0.00</div>
    </header>

    <div class="banner">
        <h1 style="font-size: 20px;">TODO TU DINERO<br>ESTÁ EN EL JUEGO</h1>
    </div>

    <div style="padding: 15px;">
        <input type="text" id="buscador" placeholder="Buscar liga o equipo..." style="width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: white; border-radius: 4px;">
    </div>

    <div id="partidos-container"></div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item"><i class="fas fa-home"></i>INICIO</a>
        <a href="#" class="nav-item"><i class="fas fa-gamepad"></i>MINIJUEGOS</a>
        <a href="#" class="nav-item"><i class="fas fa-wallet"></i>CAJERO</a>
        <a href="#" class="nav-item"><i class="fas fa-ticket"></i>BOLETO</a>
        <a href="#" class="nav-item"><i class="fas fa-user"></i>PERFIL</a>
    </nav>

    <script src="js/datos.js"></script>
    <script>
        function renderPartidos(filtro = "") {
    const container = document.getElementById('partidos-container');
    if (typeof misPartidos === 'undefined') return;

    container.innerHTML = misPartidos.filter(p => 
        p.local.toLowerCase().includes(filtro.toLowerCase())
    ).map(p => `
        <div class="partido-card">
            <div style="font-weight: bold;">${p.local} VS ${p.visitante}</div>
            <div style="display: flex; gap: 10px;">
                <button class="cuota-btn" onclick="seleccionar('${p.local}', ${p.cuota1})">1: ${p.cuota1}</button>
                <button class="cuota-btn" onclick="seleccionar('Empate', ${p.cuotaX})">X: ${p.cuotaX}</button>
                <button class="cuota-btn" onclick="seleccionar('${p.visitante}', ${p.cuota2})">2: ${p.cuota2}</button>
            </div>
        </div>
    `).join('');
}
function seleccionar(equipo, cuota) {
    alert("Seleccionaste: " + equipo + " con cuota " + cuota);
                    }


        // Función base para el calculador de apuestas
        function seleccionar(equipo, cuota) {
            console.log("Seleccionaste: " + equipo + " con cuota " + cuota);
            alert("Añadido al boleto: " + equipo + " (Cuota " + cuota + ")");
        }

        document.getElementById('buscador').addEventListener('input', (e) => renderPartidos(e.target.value));
        renderPartidos();
        // Variable para guardar el boleto
let boleto = [];

function seleccionar(idPartido, equipo, cuota) {
    // 1. Verificar si ya hay una apuesta de este mismo partido
    const yaExiste = boleto.find(item => item.idPartido === idPartido);
    
    if (yaExiste) {
        alert("Ya has seleccionado una opción para este partido. Por favor, elimina la anterior para cambiarla.");
        return;
    }

    // 2. Si no existe, agregar al boleto
    boleto.push({idPartido, equipo, cuota});
    
    // 3. Actualizar la vista
    document.getElementById('ticket-flotante').style.display = 'block';
    
    let lista = document.getElementById('lista-selecciones');
    lista.innerHTML = boleto.map(item => `
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <span>${item.equipo} (@${item.cuota})</span>
        </div>
    `).join('');
    function eliminarSeleccion(idPartido) {
    // Filtramos el boleto para eliminar la selección de ese partido
    boleto = boleto.filter(item => item.idPartido !== idPartido);
    
    // Si el boleto queda vacío, cerramos el ticket
    if (boleto.length === 0) {
        cerrarTicket();
    } else {
        // Si aún quedan selecciones, actualizamos la vista y el total
        let lista = document.getElementById('lista-selecciones');
        lista.innerHTML = boleto.map(item => `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; background:#333; padding:5px; border-radius:4px;">
                <span>${item.equipo} (@${item.cuota})</span>
                <i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="eliminarSeleccion('${item.idPartido}')"></i>
            </div>
        `).join('');
        
        let total = boleto.reduce((acc, item) => acc * item.cuota, 1);
        document.getElementById('total-cuota').innerText = total.toFixed(2);
    }
}

    let total = boleto.reduce((acc, item) => acc * item.cuota, 1);
    document.getElementById('total-cuota').innerText = total.toFixed(2);
}


    </script>
    <div style="display: flex; gap: 10px;">
    <button class="cuota-btn" ${disabledAttr} onclick="seleccionar('${p.id}', '${p.local}', ${p.cuota1})">1: ${p.cuota1}</button>
    <button class="cuota-btn" ${disabledAttr} onclick="seleccionar('${p.id}', 'Empate', ${p.cuotaX})">X: ${p.cuotaX}</button>
    <button class="cuota-btn" ${disabledAttr} onclick="seleccionar('${p.id}', '${p.visitante}', ${p.cuota2})">2: ${p.cuota2}</button>
</div>

</html>
